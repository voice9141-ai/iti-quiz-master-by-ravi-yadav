
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITI Quiz Master</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:400px;
      background:#1e293b;
      padding:25px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    h1{
      color:#38bdf8;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:18px;
    }

    button:hover{
      background:#1d4ed8;
    }
  </style>

</head>

<body>

<div class="box">

<h1>ITI Quiz Master</h1>

<p>Electronics Mechanic Practice</p>

<button>Practice MCQ</button>

<button>Mock Test</button>

<button>Previous Year Paper</button>

</div>

</body>
</html>
