

<!DOCTYPE html>
<html lang="en">
<head> 
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITI Quiz Master </title>

  <style>
    
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:400px;
      background:#1e293b;
      padding:25px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    h1{
      color:#38bdf8;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:18px;
    }

    button:hover{
      background:#1d4ed8;
    }
  </style>

</head>

<body>

<div class="box">

<h1>Ravi Tech Academy</h1>

<p>Electronics Mechanic MCQ Practice</p>
<button onclick="startQuiz()">🚀 Start Practice</button>
<button onclick="startMockTest()">Mock Test</button>

<button>Previous Year Paper</button>
<div id="quiz" style="display:none; margin-top:20px;">
  <p id="progress">Question 1/3</p>
<p id="score">Score: 0</p>
<h2 id="question"></h2> 
  
    <button onclick="checkAnswer('A')" id="A"></button>
    <button onclick="checkAnswer('B')" id="B"></button>
    <button onclick="checkAnswer('C')" id="C"></button>
    <button onclick="checkAnswer('D')" id="D"></button>
</div>
</div>
<script src="questions.js"></script>
<script src="mockQuestions.js"></script>
<script src="script.js"></script>
</body>
</html>
